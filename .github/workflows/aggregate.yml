name: Aggregate VC boards

on:
  schedule:
    # 3x daily at ~7am, 1pm, 7pm Sydney (AEST = UTC+10). Cron is UTC.
    - cron: "0 21 * * *"
    - cron: "0 3 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: aggregate
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run aggregator
        run: python scripts/aggregate.py

      - name: Upload debug snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: board-snapshots
          path: debug/
          retention-days: 5
          if-no-files-found: ignore

      - name: Commit updated jobs.json
        run: |
          git config user.name "role-scan-bot"
          git config user.email "actions@github.com"
          git add data/jobs.json
          git diff --cached --quiet || git commit -m "Update VC roles $(date -u +'%F %H:%M')"
          git pull --rebase origin main
          git push
